<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>House Hunting</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="overlay">
      <h1>Finding Your New Home Is Simple</h1>
      <p>Discover your dream house easily and quickly</p>
    </div>

    <!-- SEARCH BOX -->
    <div class="search-box">
      <input type="text" placeholder="City Street">
      <select>
        <option>Studio apartment</option>
        <option>One Bedroom</option>
        <option>Three Bedroom</option>
      </select>
      <input type="text" placeholder="Price">
      <button>Search</button>
    </div>
  </section>

  <!-- MOST VIEWED -->
  <section class="most-viewed">
    <h2>Most Viewed</h2>

    <div class="cards">
      <div class="card">
        <img src="pictures/studio.jpeg">
        <h3>Studio apartments</h3>
        <p>ksh.20,000</p>
      </div>

      <div class="card">
        <img src="pictures/onebedroom.jpeg">
        <h3>one Bedroom House</h3>
        <p>ksh.50,000</p>
      </div>

      <div class="card">
        <img src="pictures/twobedroom.jpeg">
        <h3>Two Bedroom House</h3>
        <p>ksh.100,000</p>
      </div>
    </div>
  </section>

</body>
</html>
