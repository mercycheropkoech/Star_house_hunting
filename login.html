<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Star House Hunting</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

  <!-- BACK BUTTON -->
  <a href="index.html" class="back-btn">← Back to About</a>

  <div class="auth-container">

    <!-- TOGGLE BUTTONS -->
    <div class="toggle-box">
      <button id="loginBtn" class="active" onclick="showLogin()">Login</button>
      <button onclick="showSignup()">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" class="form active">
      <h2>Welcome Back</h2>

      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>

      <button type="submit" class="main-btn">Login</button>
    </form>

    <!-- SIGN UP FORM -->
    <form id="signupForm" class="form">
      <h2>Create Account</h2>

      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>

      <button type="submit" class="main-btn">Sign Up</button>
    </form>

  </div>

    <div class="footer-info">
      <p> Nairobi, Kenya</p>
      <p>+254 71..</p>
      <p>info@starhomes.com</p>
    </div>

    <p class="copyright">
      © 2026 Star Homes. All rights reserved.
    </p>
  </div>
</footer>

  <script src="auth.js"></script>

</body>
</html>
